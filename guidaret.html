<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guida Retrosintesi — BioSpecInfo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a1b2e;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
#topbar{display:flex;align-items:center;gap:0;background:#071221;border-bottom:2px solid #1a3050;height:46px;padding:0 10px;flex-shrink:0}
#topbar .logo{color:#00c9b7;font-weight:800;font-size:1rem;margin-right:14px;white-space:nowrap;letter-spacing:-.01em}
.tab{flex:1;max-width:260px;padding:0 14px;height:100%;display:flex;align-items:center;justify-content:center;
  color:#9fb3c8;font-size:.82rem;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;text-align:center;line-height:1.2;user-select:none}
.tab.active{color:#00c9b7;border-bottom-color:#00c9b7}
.tab:hover:not(.active){color:#e2e8f0}
.badge{display:inline-block;background:rgba(0,201,183,.15);color:#00c9b7;border-radius:10px;
  padding:1px 7px;font-size:.7rem;font-weight:700;margin-left:5px}
#close-btn{margin-left:auto;background:none;border:1px solid rgba(255,107,107,.35);color:#ff6b6b;
  border-radius:8px;padding:4px 10px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap}
#close-btn:hover{background:rgba(255,107,107,.12)}
#frames{flex:1;display:flex;overflow:hidden;position:relative}
#fr1,#fr2{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff;transition:opacity .2s}
#fr2{opacity:0;pointer-events:none}
body{display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">📋 Guida Retrosintesi</div>
  <div class="tab active" onclick="switchTab(1)" id="t1">⚗️ Completo <span class="badge">98</span></div>
  <div class="tab" onclick="switchTab(2)" id="t2">⭐ Essenziale <span class="badge">24</span></div>
  <button id="close-btn" onclick="window.parent.postMessage({type:'BSI_GUIDARET_CLOSE'},'*')">✕ Chiudi</button>
</div>
<div id="frames">
  <iframe id="fr1" src="sr_completo.html" loading="lazy"></iframe>
  <iframe id="fr2" src="sr_essenziale.html" loading="lazy"></iframe>
</div>
<script>
var cur=1;
function switchTab(n){
  cur=n;
  document.getElementById('t1').classList.toggle('active',n===1);
  document.getElementById('t2').classList.toggle('active',n===2);
  document.getElementById('fr1').style.opacity=n===1?'1':'0';
  document.getElementById('fr1').style.pointerEvents=n===1?'auto':'none';
  document.getElementById('fr2').style.opacity=n===2?'1':'0';
  document.getElementById('fr2').style.pointerEvents=n===2?'auto':'none';
}
</script>
</body>
</html>
